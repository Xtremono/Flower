<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación de Flor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Tallo -->
        <div class="stem"></div>

        <!-- Hoja -->
        <div class="leaf"></div>

        <div class="flower">
            <!-- Centro de la flor -->
            <div class="center"></div>

            <!-- Pétalos -->
            <div class="petal petal-1"></div>
            <div class="petal petal-2"></div>
            <div class="petal petal-3"></div>
            <div class="petal petal-4"></div>
            <div class="petal petal-5"></div>
            <div class="petal petal-6"></div>
            <div class="petal petal-7"></div>
            <div class="petal petal-8"></div>
        </div>
    </div>

    <!-- Medusa derecha -->
    <div class="jellyfish jellyfish-right">
        <div class="jellyfish-body"></div>
        <div class="tentacle tentacle-1"></div>
        <div class="tentacle tentacle-2"></div>
        <div class="tentacle tentacle-3"></div>
        <div class="tentacle tentacle-4"></div>
        <div class="tentacle tentacle-5"></div>
        <div class="tentacle tentacle-6"></div>
    </div>

    <!-- Medusa izquierda -->
    <div class="jellyfish jellyfish-left">
        <div class="jellyfish-body"></div>
        <div class="tentacle tentacle-1"></div>
        <div class="tentacle tentacle-2"></div>
        <div class="tentacle tentacle-3"></div>
        <div class="tentacle tentacle-4"></div>
        <div class="tentacle tentacle-5"></div>
        <div class="tentacle tentacle-6"></div>
    </div>

    <!-- Pulpo superior (arriba de medusa derecha) -->
    <div class="octopus octopus-top">
        <div class="octopus-head">
            <div class="octopus-eye eye-left"></div>
            <div class="octopus-eye eye-right"></div>
        </div>
        <div class="octopus-arm arm-1"></div>
        <div class="octopus-arm arm-2"></div>
        <div class="octopus-arm arm-3"></div>
        <div class="octopus-arm arm-4"></div>
        <div class="octopus-arm arm-5"></div>
        <div class="octopus-arm arm-6"></div>
        <div class="octopus-arm arm-7"></div>
        <div class="octopus-arm arm-8"></div>
    </div>

    <!-- Pulpo inferior (abajo de medusa izquierda) -->
    <div class="octopus octopus-bottom">
        <div class="octopus-head">
            <div class="octopus-eye eye-left"></div>
            <div class="octopus-eye eye-right"></div>
        </div>
        <div class="octopus-arm arm-1"></div>
        <div class="octopus-arm arm-2"></div>
        <div class="octopus-arm arm-3"></div>
        <div class="octopus-arm arm-4"></div>
        <div class="octopus-arm arm-5"></div>
        <div class="octopus-arm arm-6"></div>
        <div class="octopus-arm arm-7"></div>
        <div class="octopus-arm arm-8"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
